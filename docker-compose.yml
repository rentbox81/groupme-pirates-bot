

services:
  groupme-bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - traefik
    labels:
      # Enable Traefik for this service
      - "traefik.enable=true"
      
      # Define the network
      - "traefik.docker.network=traefik"
      
      # HTTP router configuration
      - "traefik.http.routers.${TEAM_NAME}bot.rule=Host(`${TEAM_NAME}bot.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${TEAM_NAME}bot.entrypoints=websecure"
      - "traefik.http.routers.${TEAM_NAME}bot.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      
      # Service configuration
      - "traefik.http.services.${TEAM_NAME}bot.loadbalancer.server.port=18080"
      
      # HTTP to HTTPS redirect
      - "traefik.http.routers.${TEAM_NAME}bot-http.rule=Host(`${TEAM_NAME}bot.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${TEAM_NAME}bot-http.entrypoints=web"
      - "traefik.http.routers.${TEAM_NAME}bot-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  traefik:
    external: true
